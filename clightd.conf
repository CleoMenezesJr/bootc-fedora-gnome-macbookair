# Clightd Configuration
# For MacBook Air A1466 (Fedora bootc)

# Disable exporting D-Bus backlight interface to avoid hiding the GNOME slider
[backlight]
no_dbus = true

# Use the MacBook's FaceTimeHD camera for light sensing if ALS command fails
# But we prefer ALS via clight.conf
[sensor]
webcam_disabled = true
