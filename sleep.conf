# /usr/lib/systemd/sleep.conf.d/macbook.conf
# Hibernate is unavailable on this system (zram-only swap, no resume partition).
# If a disk-based swap is added in the future, suspend-then-hibernate can be
# re-enabled by restoring HandleLidSwitch=suspend-then-hibernate in logind.conf
# and adding HibernateDelaySec=60min here.
[Sleep]
