# Clight Main Configuration
# For MacBook Air A1466 (Fedora bootc)

verbose = false;

# Use the Mutter (GNOME) backend to keep the native slider visible
backlight: {
    enabled = true;
    restore_on_exit = true;
};

# Use the MacBook's hardware Ambient Light Sensor (ALS)
sensor: {
    # Custom command to read the applesmc sensor
    # Reading from sysfs directly
    als_command = "cat /sys/devices/platform/applesmc.768/light";
    
    # Disable webcam to save battery and stop the green LED from blinking
    # (als_command takes precedence if configured correctly)
};

# Optimized Keyboard Backlight (No blinking, smooth transitions)
keyboard: {
    disabled = false;
    # Wait 60 seconds before dimming to avoid "pulsing"
    timeout = 60;
    # Very slow transition (0.5 = 50% speed)
    dimmer = 0.5;
};

# Stop GeoClue location tracking (Santiago, Chile)
location: {
    lat = -33.4489;
    lon = -70.6693;
};

# Enable manual offset (Manual changes to the slider are remembered)
# This is handled by Clight automatically when using the mutter backend.
