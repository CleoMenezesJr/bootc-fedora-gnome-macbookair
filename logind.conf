# /usr/lib/systemd/logind.conf.d/macbook.conf
# Hibernate is unavailable on this system (zram-only swap, no resume partition),
# so suspend-then-hibernate falls back to plain suspend with a spam warning.
# Use plain suspend instead — it works reliably with the S3 deep sleep state.
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
IdleAction=suspend
IdleActionSec=900
