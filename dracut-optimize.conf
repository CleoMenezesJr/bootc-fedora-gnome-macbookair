# Dracut optimization for MacBook Air A1466
# Consolidates: no-nfs.conf + facetimehd.conf + new optimizations

# ── Strip unnecessary modules ──
omit_dracutmodules+=" nfs "
omit_drivers+=" nfs nfsv3 nfsv4 nfs_acl nfs_common sunrpc rxrpc rpcrdma auth_rpcgss rpcsec_gss_krb5 "

# ── Include FaceTimeHD camera firmware in initramfs ──
install_items+=" /usr/lib/firmware/facetimehd/firmware.bin "

# ── Compression: zstd for fast decompression ──
compress+=" zstd "

# ── Essential drivers for MacBook boot ──
add_dracutmodules+=" i915 nvme usbhid hid-apple "
